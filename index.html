<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DevNet — Тест</title>
    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #38bdf8;
            text-align: center;
        }
        .post-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        pre {
            background: #000;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            color: #4ade80;
        }
        .author {
            color: #38bdf8;
            font-weight: bold;
        }
        .date {
            color: #64748b;
            font-size: 12px;
            float: right;
        }
        #status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DevNet 💻</h1>
        
        <div id="status">Загрузка...</div>
        
        <div id="feed"></div>
    </div>

    <script>
        const API_URL = "http://localhost:8001/posts";
        
        console.log("Начинаю загрузку с:", API_URL);

        async function loadFeed() {
            try {
                console.log("Делаю запрос...");
                const response = await fetch(API_URL);
                console.log("Ответ получен, статус:", response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ошибка! Статус: ${response.status}`);
                }
                
                const posts = await response.json();
                console.log("Посты загружены:", posts);
                
                document.getElementById("status").innerHTML = "✅ Успешно загружено постов: " + posts.length;
                
                const feedDiv = document.getElementById("feed");
                feedDiv.innerHTML = "";

                posts.forEach(post => {
                    feedDiv.innerHTML += `
                        <div class="post-card">
                            <span class="date">${post.date}</span>
                            <p class="author">${post.author} пишет на [${post.language}]:</p>
                            <p>${post.description}</p>
                            <pre><code>${post.code}</code></pre>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Ошибка:", err);
                document.getElementById("status").innerHTML = "❌ Ошибка: " + err.message;
                document.getElementById("status").style.color = "red";
            }
        }

        loadFeed();
    </script>
</body>
</html>
