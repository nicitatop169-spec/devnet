<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DevNet — Сеть для Кодеров</title>
    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: sans-serif;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: #38bdf8;
            text-align: center;
        }

        .form-box, .post-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

            button:hover {
                background: #0ea5e9;
            }

        pre {
            background: #000;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            color: #4ade80;
            font-family: monospace;
        }

        .author {
            color: #38bdf8;
            font-weight: bold;
        }

        .date {
            color: #64748b;
            font-size: 12px;
            float: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DevNet 💻</h1>

        <div class="form-box">
            <input type="text" id="author" placeholder="Ваш никнейм (например, @junior_dev)">
            <input type="text" id="description" placeholder="О чем ваш пост?">
            <select id="language">
                <option value="python">Python</option>
                <option value="javascript">JavaScript</option>
                <option value="html">HTML</option>
            </select>
            <textarea id="code" rows="5" placeholder="Вставьте ваш код сюда..."></textarea>
            <button onclick="sendPost()">Опубликовать код</button>
        </div>

        <div id="feed"></div>
    </div>

    <script>
        // АДРЕС ИСПРАВЛЕН И НАПИСАН ПОЛНОСТЬЮ:
        const API_URL = "https://bznkv-95-25-44-176.run.pinggy-free.link";

        async function loadFeed() {
            try {
                const response = await fetch(API_URL);
                const posts = await response.json();
                const feedDiv = document.getElementById("feed");
                feedDiv.innerHTML = "";

                posts.forEach(post => {
                    feedDiv.innerHTML += `
                            <div class="post-card">
                                <span class="date">${post.date}</span>
                                <p class="author">${post.author} <span style="color:#64748b; font-weight:normal;">пишет на [${post.language}]:</span></p>
                                <p>${post.description}</p>
                                <pre><code>${post.code}</code></pre>
                            </div>
                        `;
                });
            } catch (err) {
                console.error("Ошибка подключения к бэкенду:", err);
            }
        }

        async function sendPost() {
            const author = document.getElementById("author").value;
            const description = document.getElementById("description").value;
            const language = document.getElementById("language").value;
            const code = document.getElementById("code").value;

            if (!author || !code) return alert("Заполните никнейм и поле с кодом!");

            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ author, description, language, code })
                });

                document.getElementById("code").value = "";
                document.getElementById("description").value = "";

                loadFeed();
            } catch (err) {
                alert("Не удалось отправить пост. Проверьте, запущено ли черное окно Python!");
            }
        }

        loadFeed();
    </script>
</body>
</html>
